<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rover · Discover Victoria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=DM+Sans:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a08;--off:#f5f0e8;--stone:#c8bfb0;--mist:#8a8478;
  --gold:#c9973a;--ember:#b85c2a;--sage:#2d4a35;--leaf:#4a7a52;
  --card:#ffffff;--border:#e8e0d0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans','Noto Sans SC',sans-serif;background:var(--off);color:var(--black);overflow-x:hidden;}

/* LOADER - removed */

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;transition:all .5s;}
nav.solid{background:rgba(245,240,232,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(–border);padding:1rem 3rem;}
.nav-brand{font-family:‘Cormorant Garamond’,serif;font-size:1.4rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(–off);transition:color .5s;}
nav.solid .nav-brand{color:var(–black);}
.nav-right{display:flex;align-items:center;gap:2rem;}
.nav-link{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,240,232,.5);border:none;background:none;cursor:pointer;font-family:inherit;transition:color .3s;}
nav.solid .nav-link{color:var(–mist);}
.nav-link:hover{color:var(–off)!important;}
nav.solid .nav-link:hover{color:var(–black)!important;}
.nav-cta{padding:.45rem 1.2rem;border:1px solid rgba(245,240,232,.3);border-radius:100px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(–off);background:transparent;cursor:pointer;font-family:inherit;transition:all .3s;}
nav.solid .nav-cta{border-color:var(–sage);color:var(–sage);}
.nav-cta:hover{background:var(–off);color:var(–black);}
nav.solid .nav-cta:hover{background:var(–sage);color:var(–off);}

/* HERO */
.hero{height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hero-slides{position:absolute;inset:0;background:linear-gradient(155deg,#0a1a12 0%,#1a3525 40%,#2a5538 70%,#1a3525 100%);}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.8s ease;}
.hero-slide.active{opacity:1;}
.hero-slide img{width:100%;height:100%;object-fit:cover;object-position:center 40%;filter:brightness(.6) saturate(.85) contrast(1.05);transform:scale(1.08);transition:transform 9s ease-out;}
.hero-slide.active img{transform:scale(1.0);}
.hero-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(10,10,8,.6) 100%);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,8,.95) 0%,rgba(10,10,8,.65) 30%,rgba(10,10,8,.35) 60%,rgba(10,10,8,.4) 100%);}
.hero-grain{position:absolute;inset:0;opacity:.03;background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=’.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);}

.hero-content{position:relative;z-index:2;text-align:center;width:100%;max-width:800px;padding:0 2rem;}
.hero-eyebrow{font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(245,240,232,.45);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem;}
.eyebrow-dash{width:24px;height:1px;background:var(–gold);}
.hero h1{font-family:‘Cormorant Garamond’,serif;font-size:clamp(3.5rem,8vw,7rem);font-weight:200;line-height:.95;letter-spacing:.05em;color:#fff;margin-bottom:1rem;text-transform:uppercase;text-shadow:0 2px 30px rgba(0,0,0,.6);}
.hero h1 span{display:block;font-style:italic;font-weight:300;letter-spacing:.02em;font-size:clamp(2rem,5vw,4.5rem);}
.hero-desc{font-size:.95rem;line-height:1.8;font-weight:300;color:rgba(255,255,255,.8);margin-bottom:3rem;max-width:420px;margin-left:auto;margin-right:auto;text-shadow:0 1px 16px rgba(0,0,0,.5);}

/* SEARCH BOX */
.search-wrap{position:relative;max-width:580px;margin:0 auto 1.5rem;}
.search-box{width:100%;background:rgba(245,240,232,.08);backdrop-filter:blur(20px);border:1px solid rgba(245,240,232,.2);border-radius:100px;padding:1.1rem 1.5rem 1.1rem 3.2rem;font-family:‘DM Sans’,sans-serif;font-size:1rem;color:var(–off);outline:none;transition:all .3s;}
.search-box::placeholder{color:rgba(245,240,232,.35);}
.search-box:focus{background:rgba(245,240,232,.12);border-color:rgba(245,240,232,.4);}
.search-icon{position:absolute;left:1.2rem;top:50%;transform:translateY(-50%);color:rgba(245,240,232,.4);pointer-events:none;font-size:.9rem;}
.search-btn{position:absolute;right:.4rem;top:50%;transform:translateY(-50%);padding:.6rem 1.4rem;background:var(–gold);color:var(–black);border:none;border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .25s;letter-spacing:.05em;}
.search-btn:hover{background:#d4a84b;transform:translateY(-50%) scale(1.03);}
.search-dropdown{position:absolute;top:calc(100%+8px);left:0;right:0;background:rgba(10,10,8,.92);backdrop-filter:blur(20px);border:1px solid rgba(245,240,232,.12);border-radius:16px;overflow:hidden;z-index:50;display:none;max-height:320px;overflow-y:auto;}
.search-dropdown.open{display:block;}
.sd-item{padding:.9rem 1.4rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;transition:background .15s;border-bottom:1px solid rgba(245,240,232,.06);}
.sd-item:last-child{border-bottom:none;}
.sd-item:hover{background:rgba(245,240,232,.06);}
.sd-name{font-size:.88rem;color:var(–off);}
.sd-region{font-size:.7rem;color:rgba(245,240,232,.4);}

.hero-tags{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;}
.htag{padding:.38rem .9rem;border:1px solid rgba(245,240,232,.18);border-radius:100px;font-size:.72rem;color:rgba(245,240,232,.55);cursor:pointer;transition:all .2s;letter-spacing:.05em;background:transparent;}
.htag:hover{border-color:rgba(245,240,232,.4);color:var(–off);background:rgba(245,240,232,.06);}

/* HERO FOOTER */
.hero-footer{position:absolute;bottom:0;left:0;right:0;z-index:2;display:flex;align-items:flex-end;justify-content:space-between;padding:2rem 3rem;}
.hero-loc{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.35);display:flex;align-items:center;gap:.5rem;transition:opacity .4s;}
.hero-loc::before{content:’’;width:16px;height:1px;background:var(–gold);}
.hero-scroll-hint{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.25);display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.scroll-track{width:1px;height:40px;background:rgba(245,240,232,.1);position:relative;overflow:hidden;}
.scroll-runner{position:absolute;top:0;left:0;right:0;height:40%;background:var(–gold);animation:run 2s ease infinite;}
@keyframes run{0%{top:-40%}100%{top:120%}}
.hero-dots{display:flex;gap:.5rem;align-items:center;}
.hdot{width:5px;height:5px;border-radius:50%;background:rgba(245,240,232,.25);cursor:pointer;transition:all .3s;}
.hdot.on{background:var(–gold);width:18px;border-radius:3px;}
.hero-not-sure{margin-top:1.25rem;background:transparent;border:none;color:rgba(245,240,232,.45);font-family:‘DM Sans’,sans-serif;font-size:.78rem;letter-spacing:.08em;cursor:pointer;transition:color .25s;text-decoration:underline;text-underline-offset:4px;text-decoration-color:rgba(245,240,232,.2);}
.hero-not-sure:hover{color:rgba(245,240,232,.75);}

/* FEATURED */
.featured-sec{padding:5rem 3rem;max-width:1200px;margin:0 auto;}
.feat-header{margin-bottom:2.5rem;}
.feat-eyebrow{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(–gold);margin-bottom:.5rem;}
.feat-title{font-family:‘Cormorant Garamond’,serif;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:300;color:var(–black);margin-bottom:.4rem;}
.feat-title em{font-style:italic;color:var(–sage);}
.feat-sub{font-size:.85rem;color:var(–mist);font-weight:300;}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.1rem;}
.feat-card{border-radius:16px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:3/4;transition:transform .3s,box-shadow .3s;}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.15);}
.feat-card img{width:100%;height:100%;object-fit:cover;filter:brightness(.72) saturate(.85);transition:transform .5s,filter .5s;}
.feat-card:hover img{transform:scale(1.05);filter:brightness(.8) saturate(.9);}
.feat-card-body{position:absolute;bottom:0;left:0;right:0;padding:1.25rem;background:linear-gradient(to top,rgba(10,10,8,.85) 0%,transparent 100%);}
.feat-region{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.55);margin-bottom:.2rem;}
.feat-name{font-family:‘Cormorant Garamond’,serif;font-size:1.1rem;font-weight:400;color:var(–off);line-height:1.2;}
.feat-card-wide{grid-column:span 2;aspect-ratio:unset;height:320px;}

/* WIZARD */
#wizard{display:none;position:fixed;inset:0;z-index:200;background:var(–off);overflow-y:auto;}
#wizard.show{display:block;animation:wizIn .4s ease;}
@keyframes wizIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.wiz-top{position:sticky;top:0;z-index:10;background:rgba(245,240,232,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(–border);padding:1.1rem 3rem;display:flex;align-items:center;justify-content:space-between;}
.wiz-back{display:flex;align-items:center;gap:.4rem;font-size:.75rem;letter-spacing:.08em;color:var(–mist);cursor:pointer;border:none;background:none;font-family:inherit;transition:color .2s;}
.wiz-back:hover{color:var(–black);}
.wiz-brand{font-family:‘Cormorant Garamond’,serif;font-size:1.1rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(–black);}
.wiz-prog{display:flex;align-items:center;gap:.3rem;}
.wp{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:500;border:1.5px solid var(–stone);color:var(–mist);background:white;transition:all .3s;}
.wp.on{background:var(–sage);border-color:var(–sage);color:white;}
.wp.done{background:var(–leaf);border-color:var(–leaf);color:white;}
.wp-line{width:18px;height:1px;background:var(–border);transition:background .3s;}
.wp-line.done{background:var(–leaf);}

.wiz-body{max-width:1040px;margin:0 auto;padding:3rem 2rem 8rem;}

/* Step headers */
.sno{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(–gold);margin-bottom:.6rem;}
.stitle{font-family:‘Cormorant Garamond’,serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;letter-spacing:-.01em;color:var(–black);margin-bottom:.4rem;line-height:1.1;}
.stitle em{font-style:italic;color:var(–sage);}
.ssub{font-size:.85rem;color:var(–mist);font-weight:300;margin-bottom:2.5rem;max-width:520px;}

/* Vibes */
.vibes{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem;}
.vibe{padding:1.6rem 1.2rem;border:1px solid var(–border);border-radius:16px;background:white;cursor:pointer;text-align:center;transition:all .25s;}
.vibe:hover{border-color:var(–sage);}
.vibe.on{border-color:var(–sage);background:rgba(45,74,53,.03);}
.vi{font-size:1.6rem;margin-bottom:.5rem;display:block;}
.vn{font-size:.84rem;font-weight:500;margin-bottom:.15rem;}
.vh{font-size:.68rem;color:var(–mist);}

/* Dest recs */
.dest-recs{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.drec{border:1.5px solid var(–border);border-radius:16px;overflow:hidden;background:white;cursor:pointer;transition:all .28s;}
.drec:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.08);border-color:var(–stone);}
.drec.on{border-color:var(–sage);}
.drec-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;overflow:hidden;}
.drec-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.75) saturate(.85);}
.drec-body{padding:.85rem 1rem;}
.drec-region{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(–gold);margin-bottom:.2rem;}
.drec-name{font-family:‘Cormorant Garamond’,serif;font-size:1rem;font-weight:400;margin-bottom:.2rem;}
.drec-why{font-size:.7rem;color:var(–mist);line-height:1.5;}

/* Dest search in wizard */
.dest-field-wrap{position:relative;margin-bottom:2rem;}
.dest-field{width:100%;font-family:‘DM Sans’,sans-serif;font-size:.95rem;padding:1rem 1.2rem 1rem 2.8rem;border:1px solid var(–border);border-radius:12px;background:white;color:var(–black);outline:none;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.dest-field:focus{border-color:var(–sage);box-shadow:0 0 0 3px rgba(45,74,53,.06);}
.dest-field-ico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);pointer-events:none;font-size:.85rem;}
.dest-ddl{position:absolute;top:calc(100%+6px);left:0;right:0;background:white;border:1px solid var(–border);border-radius:12px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.1);z-index:20;display:none;max-height:280px;overflow-y:auto;}
.dest-ddl.open{display:block;}
.dopt{padding:.8rem 1.2rem;cursor:pointer;display:flex;align-items:center;gap:.7rem;transition:background .15s;border-bottom:1px solid var(–border);}
.dopt:last-child{border-bottom:none;}
.dopt:hover{background:var(–off);}
.dopt-n{font-size:.85rem;}
.dopt-r{font-size:.68rem;color:var(–mist);}
.dest-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(45,74,53,.07);border:1px solid rgba(45,74,53,.15);border-radius:100px;padding:.4rem .9rem;font-size:.82rem;color:var(–sage);margin-bottom:1.75rem;}

/* Basics */
.basics-g{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.5rem;}
.fld{display:flex;flex-direction:column;gap:.4rem;}
.fld label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(–mist);}
.fld select{font-family:‘DM Sans’,sans-serif;font-size:.88rem;padding:.75rem .9rem;border:1px solid var(–border);border-radius:10px;background:white;color:var(–black);outline:none;transition:border-color .2s;}
.fld select:focus{border-color:var(–sage);}
.people-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.pbox{background:white;border:1px solid var(–border);border-radius:12px;padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;}
.plbl{font-size:.78rem;font-weight:500;color:var(–black);}
.psub{font-size:.62rem;color:var(–mist);}
.ctr{display:flex;align-items:center;gap:.65rem;}
.cbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(–border);background:var(–off);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(–black);}
.cbtn:hover{border-color:var(–sage);background:rgba(45,74,53,.05);}
.cnum{font-size:.92rem;font-weight:500;min-width:16px;text-align:center;}

/* Filter chips */
.filter-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;}
.fchip{padding:.32rem .8rem;border:1px solid var(–border);border-radius:100px;font-size:.72rem;cursor:pointer;background:white;color:var(–mist);transition:all .18s;}
.fchip:hover{border-color:var(–sage);color:var(–sage);}
.fchip.on{background:var(–sage);border-color:var(–sage);color:white;}

/* Place cards */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-bottom:8rem;}
.pc{border:1px solid var(–border);border-radius:18px;overflow:hidden;background:white;position:relative;cursor:pointer;transition:all .28s;}
.pc:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.1);border-color:var(–stone);}
.pc.sel{border-color:var(–sage);}
.pc-tick{display:none;position:absolute;top:.75rem;right:.75rem;width:22px;height:22px;border-radius:50%;background:var(–sage);color:white;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;z-index:3;box-shadow:0 2px 8px rgba(45,74,53,.3);}
.pc.sel .pc-tick{display:flex;}
.pc-overlay{position:absolute;inset:0;z-index:2;}
.pc-img{height:160px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;}
.pc-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.9) saturate(.85);transition:transform .5s ease;}
.pc:hover .pc-img img{transform:scale(1.06);}
.pc-emoji{font-size:3rem;position:relative;z-index:1;opacity:.6;}
.pc-body{padding:1rem;}
.pc-cat{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(–gold);margin-bottom:.22rem;}
.pc-name{font-family:‘Cormorant Garamond’,serif;font-size:1.1rem;font-weight:400;margin-bottom:.28rem;line-height:1.2;}
.pc-desc{font-size:.72rem;color:var(–mist);line-height:1.55;margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-foot{display:flex;align-items:center;justify-content:space-between;}
.pc-rat{font-size:.68rem;color:var(–gold);}
.pc-price{font-size:.68rem;color:var(–leaf);font-weight:500;}
.pc-more{font-size:.65rem;color:var(–mist);margin-top:.42rem;display:inline-flex;align-items:center;gap:.2rem;cursor:pointer;transition:color .2s;position:relative;z-index:5;}
.pc-more:hover{color:var(–sage);}

/* Loading skeleton */
.skel{background:linear-gradient(90deg,#f0ebe0 25%,#e8e0d0 50%,#f0ebe0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{border-radius:18px;overflow:hidden;border:1px solid var(–border);}
.skel-img{height:160px;}
.skel-body{padding:1rem;}
.skel-line{height:12px;border-radius:6px;margin-bottom:.6rem;}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(245,240,232,.97);backdrop-filter:blur(20px);border-top:1px solid var(–border);padding:.9rem 3rem;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .35s ease;}
.bbar.show{transform:translateY(0);}
.bbar-info{font-size:.82rem;color:var(–mist);}
.bbar-info strong{color:var(–black);font-weight:500;}
.bbar-btns{display:flex;gap:.65rem;}
.btn-skip{padding:.55rem 1.3rem;border:1px solid var(–border);border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.75rem;color:var(–mist);background:transparent;cursor:pointer;transition:all .2s;}
.btn-skip:hover{border-color:var(–stone);color:var(–black);}
.btn-next{padding:.55rem 1.6rem;background:var(–sage);color:white;border:none;border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.btn-next:hover{background:var(–leaf);}

/* DRAWER */
#drBg{position:fixed;inset:0;z-index:299;background:rgba(10,10,8,.45);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .4s;}
#drBg.show{opacity:1;pointer-events:all;}
#drawer{position:fixed;top:0;right:0;bottom:0;z-index:300;width:480px;background:white;box-shadow:-24px 0 80px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .42s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
#drawer.open{transform:translateX(0);}
.dr-hero{height:260px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;}
.dr-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.8) saturate(.85);}
.dr-hero-emoji{position:relative;z-index:1;font-size:4.5rem;opacity:.35;}
.dr-close{position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;z-index:2;transition:background .2s;}
.dr-close:hover{background:white;}
.dr-body{padding:1.75rem;}
.dr-cat{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(–gold);margin-bottom:.4rem;}
.dr-name{font-family:‘Cormorant Garamond’,serif;font-size:1.8rem;font-weight:400;color:var(–black);margin-bottom:.2rem;line-height:1.15;}

function goSlide(idx){
  document.getElementById('slide-'+slideIdx)?.classList.remove('active');
  document.querySelectorAll('.hdot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  slideIdx=idx;
  const slide=document.getElementById('slide-'+idx);
  if(slide) slide.classList.add('active');
  const loc=document.getElementById('heroLoc');
  if(loc){loc.style.opacity='0';setTimeout(()=>{loc.textContent=HERO_SLIDES[idx].loc;loc.style.opacity='1';loc.style.transition='opacity .5s';},300);}

const STEPS_A=['basics','attractions','restaurants','hotels','result'];
const STEPS_B=['vibes','dest_pick','basics','attractions','restaurants','hotels','result'];

function openWizard(p,skipBasics=false){
  path=p;
  steps=p==='A'?STEPS_A:STEPS_B;
  // Entry A: always start at basics (step 0) so user fills people/days first
  // Only skip basics if coming from quickDest AND dest already set
  if(p==='A'&&skipBasics&&state.dest){
    step=0; // still show basics - just pre-fill dest
  } else {
    step=0;
  }
  if(p==='A'){
    state={...state,vibes:[],attractions:[],restaurants:[],hotels:[]};
  } else {
    state={dest:'',vibes:[],adults:2,children:0,days:'2天',budget:'中等',transport:'自驾',attractions:[],restaurants:[],hotels:[]};
  }
  document.getElementById('wizard').classList.add('show');
  window.scrollTo(0,0);
  renderStep();
}
function closeWizard(){document.getElementById('wizard').classList.remove('show');document.getElementById('bbar').classList.remove('show');state.dest='';}
function nextStep(){if(step<steps.length-1){step++;document.getElementById('wizBody').style.opacity='0';setTimeout(renderStep,200);}}

function renderProg(){
  const labels={vibes:'偏好',dest_pick:'目的地',basics:'信息',attractions:'景点',restaurants:'餐厅',hotels:'住宿',result:'攻略'};
  document.getElementById('wizProg').innerHTML=steps.map((s,i)=>{
    const cls=i<step?'done':i===step?'on':'';
    const line=i<steps.length-1?`<div class="wp-line${i<step?' done':''}"></div>`:'';
    return `<div class="wp ${cls}">${i<step?'✓':i+1}</div>${line}`;
  }).join('');
}

function animIn(el){el.style.opacity='0';el.style.transform='translateY(12px)';el.style.transition='none';setTimeout(()=>{el.style.transition='all .3s ease';el.style.opacity='1';el.style.transform='translateY(0)';},30);}

function renderStep(){
  renderProg();
  const b=document.getElementById('wizBody');
  animIn(b);
  document.getElementById('bbar').classList.remove('show');
  const s=steps[step];
  if(s==='vibes') renderVibes(b);
  else if(s==='dest_pick') renderDestPick(b);
  else if(s==='basics') renderBasics(b);
  else if(s==='attractions') renderPlaces(b,'attractions');
  else if(s==='restaurants') renderPlaces(b,'restaurants');
  else if(s==='hotels') renderPlaces(b,'hotels');
  else if(s==='result') renderResult(b);
}

  if(!f.length){ddl.classList.remove('open');return;}
  ddl.innerHTML=f.slice(0,10).map(c=>`<div class="dopt" onclick="selDest('${c.n}')"><span>${c.e}</span><div><div class="dopt-n">${c.n}</div><div class="dopt-r">${c.r}</div></div></div>`).join('');

function selDest(n){state.dest=n;state.attractions=[];state.restaurants=[];state.hotels=[];const f=document.getElementById('destF');if(f)f.value=n;hideDest();}
function hideDest(){const d=document.getElementById('destDdl');if(d)d.classList.remove('open');}

  nextStep();
}

// ── PLACES (Google Places API) ──
const GKEY='AIzaSyDegBY5wqNKPshtxbMkyXhpYSNYuEjT9mk';
const EMOJI_MAP={tourist_attraction:'🏛',natural_feature:'🌿',park:'🌲',museum:'🏛',church:'⛪',amusement_park:'🎡',zoo:'🐨',art_gallery:'🎨',restaurant:'🍽',cafe:'☕',bar:'🍺',bakery:'🥐',lodging:'🏨',default:'📍'};
function placeEmoji(types=[]){for(const t of types)if(EMOJI_MAP[t])return EMOJI_MAP[t];return EMOJI_MAP.default;}
function photoUrl(photos){if(!photos?.length)return null;return `https://maps.googleapis.com/maps/api/place/photo?maxwidth=600&photo_reference=${photos[0].photo_reference}&key=${GKEY}`;}

// No random Unsplash - use gradient background with emoji to avoid wrong images
function unsplashFallback(name,type,dest){return null;}

async function fetchPlaces(dest,type){
  const key=`${dest}__${type}`;
  if(cache[key])return cache[key];
  try{
    // Use more specific search to get Victoria Australia results only
    const res=await fetch(`/.netlify/functions/places?query=${encodeURIComponent(dest)}&type=${type}`);
    const data=await res.json();
    if(!data.results?.length)return[];
    // Filter to only Victoria Australia results
    const items=data.results
      .filter(p=>p.formatted_address&&(
        p.formatted_address.includes('VIC')||
        p.formatted_address.includes('Victoria')||
        p.formatted_address.includes('Australia')
      ))
      .slice(0,15)
      .map((p,i)=>({
        id:p.place_id||`p${i}`,name:p.name,
        cat:(p.types?.[0]||'place').replace(/_/g,' '),
        e:placeEmoji(p.types),
        photo:photoUrl(p.photos),
        desc:p.formatted_address||'',
        rating:p.rating?.toFixed(1)||'N/A',
        price:p.price_level?'$'.repeat(p.price_level):'—',
        hours:p.opening_hours?.open_now!=null?(p.opening_hours.open_now?'现在营业中':'现在关闭'):'—',
        address:p.formatted_address||'',
        reviews:(p.reviews||[]).slice(0,2).map(r=>({a:r.author_name,s:'Google',t:r.text?.slice(0,120)||''})),
        place_id:p.place_id,types:p.types||[],
      }));
    // If filter removed too many, use unfiltered
    const final=items.length>=3?items:data.results.slice(0,15).map((p,i)=>({
      id:p.place_id||`p${i}`,name:p.name,
      cat:(p.types?.[0]||'place').replace(/_/g,' '),
      e:placeEmoji(p.types),photo:photoUrl(p.photos),
      desc:p.formatted_address||'',rating:p.rating?.toFixed(1)||'N/A',
      price:p.price_level?'$'.repeat(p.price_level):'—',
      hours:p.opening_hours?.open_now!=null?(p.opening_hours.open_now?'现在营业中':'现在关闭'):'—',
      address:p.formatted_address||'',
      reviews:(p.reviews||[]).slice(0,2).map(r=>({a:r.author_name,s:'Google',t:r.text?.slice(0,120)||''})),
      place_id:p.place_id,types:p.types||[],
    }));
    cache[key]=final;return final;
  }catch(e){console.error(e);return[];}
}

  el.innerHTML=`<div class="sno">Step ${sn} · ${labels[type]}</div>

  grid.innerHTML=items.map(item=>`

      <div class="pc-img">
        ${item.photo?`<img src="${item.photo}" alt="${item.name}" onerror="this.style.display='none'">`:``}
        <span class="pc-emoji" style="${item.photo?'opacity:.0':'opacity:1;font-size:3.5rem'}">${item.e}</span>
      </div>
      <div class="pc-body">
        <div class="pc-cat">${item.cat}</div>
        <div class="pc-name">${item.name}</div>
        <div class="pc-desc">${item.desc}</div>
        <div class="pc-foot">
          <span class="pc-rat">${item.rating!=='N/A'?'★ '+item.rating:'—'}</span>
          <span class="pc-price">${item.price}</span>
        </div>
        <div class="pc-more" onclick="openDr('${type}','${item.id}',event)">详细介绍 →</div>
      </div>

}

function applyFilter(type,chip,el){
  currentFilter[type]=chip;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  const dest=state.dest||'Melbourne';
  const grid=document.getElementById('pgrid');
  if(grid) grid.innerHTML=`<div style="grid-column:1/-1;padding:2rem 0;display:flex;align-items:center;gap:.75rem;color:var(--mist)"><div class="spin"></div>加载中…</div>`;
  // For '全部', use original cached results
  const q=chip==='全部'?dest:`${chip} ${dest}`;
  fetchPlaces(q,type).then(items=>{
    renderCards(type,items,state[type]);
    document.getElementById('bbar').classList.add('show');
    updateBbar(type);
  });
}
}

function togglePlace(type,id){
  const a=state[type];a.includes(id)?state[type]=a.filter(x=>x!==id):state[type].push(id);
  document.getElementById('pc-'+id)?.classList.toggle('sel',state[type].includes(id));
  updateBbar(type);
  document.getElementById('bbar').classList.toggle('show',state[type].length>0);
}
function updateBbar(type){const n=state[type].length;const lb={attractions:'个景点',restaurants:'家餐厅',hotels:'家住宿'};document.getElementById('bbarN').textContent=n;document.querySelector('.bbar-info').innerHTML=`已选 <strong>${n}</strong> ${lb[type]||'项'}`;}

    if(!res.ok)throw new Error('API error');
    const body=document.getElementById('resBody');body.innerHTML='';
    const reader=res.body.getReader();const dec=new TextDecoder();let full='';
    while(true){const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split('\n')){
        if(line.startsWith('data: ')){const d=line.slice(6);if(d==='[DONE]')continue;
          try{const j=JSON.parse(d);if(j.type==='content_block_delta'&&j.delta?.text){full+=j.delta.text;body.innerHTML=fmt(full)+'<span class="cursor"></span>';}}catch{}
        }
      }
    }
    document.getElementById('resBody').innerHTML=fmt(full);
  }catch(e){document.getElementById('resBody').innerHTML=`<div style="color:var(--ember);padding:1rem">生成失败，请重试。</div>`;}
}

function fmt(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
