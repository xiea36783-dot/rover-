<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rover · Discover Victoria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a08;--off:#f5f0e8;--stone:#c8bfb0;--mist:#8a8478;--gold:#c9973a;--sage:#2d4a35;--leaf:#4a7a52;--border:#e8e0d0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--black);overflow-x:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;transition:all .4s;}
nav.solid{background:rgba(245,240,232,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(–border);padding:1rem 3rem;}
.nav-brand{font-family:‘Cormorant Garamond’,serif;font-size:1.4rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:#fff;transition:color .4s;}
nav.solid .nav-brand{color:var(–black);}
.nav-cta{padding:.45rem 1.2rem;border:1px solid rgba(255,255,255,.4);border-radius:100px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:transparent;cursor:pointer;font-family:inherit;transition:all .3s;}
nav.solid .nav-cta{border-color:var(–sage);color:var(–sage);}
.nav-cta:hover{background:#fff;color:var(–black);}
nav.solid .nav-cta:hover{background:var(–sage);color:#fff;}
.nav-links{display:flex;align-items:center;gap:2rem;}
.nav-link{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);border:none;background:none;cursor:pointer;font-family:inherit;}
nav.solid .nav-link{color:var(–mist);}

/* HERO */
.hero{height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(155deg,#0a1a12 0%,#1a3525 45%,#2a5538 100%);}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 2s ease;}
.hero-slide.active{opacity:1;}
.hero-slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.55) saturate(.8);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,8,.9) 0%,rgba(10,10,8,.4) 40%,rgba(10,10,8,.15) 100%);}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 2rem;max-width:800px;}
.hero-eyebrow{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem;}
.eyebrow-dash{width:24px;height:1px;background:var(–gold);}
.hero h1{font-family:‘Cormorant Garamond’,serif;font-size:clamp(3rem,8vw,6.5rem);font-weight:200;line-height:.95;letter-spacing:.05em;color:#fff;margin-bottom:1rem;text-transform:uppercase;text-shadow:0 2px 40px rgba(0,0,0,.5);}
.hero h1 em{display:block;font-style:italic;font-size:clamp(2rem,5vw,4rem);}
.hero-desc{font-size:.92rem;color:rgba(255,255,255,.6);margin-bottom:2.5rem;font-weight:300;text-shadow:0 1px 12px rgba(0,0,0,.4);}
.search-wrap{position:relative;max-width:560px;margin:0 auto 1.5rem;}
.search-inp{width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.22);border-radius:100px;padding:1rem 1.4rem 1rem 3rem;font-family:‘DM Sans’,sans-serif;font-size:.95rem;color:#fff;outline:none;}
.search-inp::placeholder{color:rgba(255,255,255,.4);}
.search-ico{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-style:normal;}
.search-btn{position:absolute;right:.4rem;top:50%;transform:translateY(-50%);padding:.58rem 1.3rem;background:var(–gold);color:var(–black);border:none;border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .25s;}
.search-btn:hover{background:#d4a84b;}
.search-ddl{position:absolute;top:calc(100%+8px);left:0;right:0;background:rgba(10,10,8,.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;z-index:50;display:none;}
.search-ddl.open{display:block;}
.sd-item{padding:.85rem 1.4rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid rgba(255,255,255,.06);transition:background .15s;}
.sd-item:last-child{border:none;}
.sd-item:hover{background:rgba(255,255,255,.06);}
.sd-name{font-size:.86rem;color:#fff;}
.sd-reg{font-size:.68rem;color:rgba(255,255,255,.4);}
.hero-tags{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1rem;}
.htag{padding:.35rem .85rem;border:1px solid rgba(255,255,255,.18);border-radius:100px;font-size:.7rem;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;}
.htag:hover{border-color:rgba(255,255,255,.4);color:#fff;}
.hero-notsure{background:transparent;border:none;color:rgba(255,255,255,.4);font-family:‘DM Sans’,sans-serif;font-size:.75rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:color .2s;}
.hero-notsure:hover{color:rgba(255,255,255,.7);}
.hero-loc{position:absolute;left:3rem;bottom:2rem;z-index:2;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:.5rem;transition:opacity .5s;}
.hero-loc::before{content:’’;width:16px;height:1px;background:var(–gold);}
.hero-dots{position:absolute;right:3rem;bottom:2rem;z-index:2;display:flex;gap:.4rem;}
.hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s;}
.hdot.on{background:var(–gold);width:16px;border-radius:3px;}

/* FEATURED */
.feat-sec{padding:5rem 3rem;max-width:1200px;margin:0 auto;}
.feat-eyebrow{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(–gold);margin-bottom:.5rem;}
.feat-title{font-family:‘Cormorant Garamond’,serif;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:300;color:var(–black);margin-bottom:.4rem;}
.feat-title em{font-style:italic;color:var(–sage);}
.feat-sub{font-size:.84rem;color:#555;margin-bottom:2rem;}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.fc{border-radius:16px;overflow:hidden;cursor:pointer;position:relative;height:260px;transition:transform .3s;}
.fc:hover{transform:translateY(-4px);}
.fc.wide{grid-column:span 2;}
.fc img{width:100%;height:100%;object-fit:cover;filter:brightness(.7) saturate(.85);transition:transform .5s,filter .4s;}
.fc:hover img{transform:scale(1.05);filter:brightness(.8) saturate(.9);}
.fc-body{position:absolute;bottom:0;left:0;right:0;padding:1.2rem;background:linear-gradient(to top,rgba(10,10,8,.85) 0%,transparent 100%);}
.fc-reg{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,240,232,.55);margin-bottom:.2rem;}
.fc-name{font-family:‘Cormorant Garamond’,serif;font-size:1.1rem;font-weight:400;color:#fff;}

/* WIZARD */
#wiz{display:none;position:fixed;inset:0;z-index:200;background:#fff;overflow-y:auto;}
#wiz.show{display:block;}
.wiz-nav{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(–border);padding:1.1rem 3rem;display:flex;align-items:center;justify-content:space-between;}
.wiz-back{font-size:.75rem;color:var(–mist);cursor:pointer;border:none;background:none;font-family:inherit;}
.wiz-back:hover{color:var(–black);}
.wiz-brand{font-family:‘Cormorant Garamond’,serif;font-size:1.1rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;}
.wiz-prog{display:flex;align-items:center;gap:.3rem;}
.wp{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:500;border:1.5px solid var(–stone);color:var(–mist);background:#fff;transition:all .3s;}
.wp.on{background:var(–sage);border-color:var(–sage);color:#fff;}
.wp.done{background:var(–leaf);border-color:var(–leaf);color:#fff;}
.wp-line{width:16px;height:1px;background:var(–border);transition:background .3s;}
.wp-line.done{background:var(–leaf);}
.wiz-body{max-width:1020px;margin:0 auto;padding:3rem 2rem 9rem;}
.sno{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(–gold);margin-bottom:.6rem;}
.stitle{font-family:‘Cormorant Garamond’,serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;color:var(–black);margin-bottom:.4rem;}
.stitle em{font-style:italic;color:var(–sage);}
.ssub{font-size:.84rem;color:#555;margin-bottom:2rem;}

/* VIBES */
.vibes-g{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.vibe{padding:1.5rem 1.1rem;border:1px solid var(–border);border-radius:14px;background:#fff;cursor:pointer;text-align:center;transition:all .22s;}
.vibe:hover,.vibe.on{border-color:var(–sage);}
.vibe.on{background:rgba(45,74,53,.03);}
.vi{font-size:1.6rem;display:block;margin-bottom:.4rem;}
.vn{font-size:.83rem;font-weight:500;margin-bottom:.12rem;}
.vh{font-size:.68rem;color:var(–mist);}

/* DEST RECS */
.drecs{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.drec{border:1.5px solid var(–border);border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;transition:all .25s;}
.drec:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.08);}
.drec.on{border-color:var(–sage);}
.drec-img{height:100px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.drec-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.7);}
.drec-body{padding:.85rem 1rem;}
.drec-reg{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(–gold);margin-bottom:.18rem;}
.drec-name{font-family:‘Cormorant Garamond’,serif;font-size:1rem;font-weight:400;margin-bottom:.18rem;}
.drec-why{font-size:.7rem;color:var(–mist);line-height:1.5;}
.dest-hint{font-size:.8rem;color:var(–mist);}

/* BASICS */
.dest-wrap{position:relative;margin-bottom:1.5rem;}
.dest-inp{width:100%;font-family:‘DM Sans’,sans-serif;font-size:.92rem;padding:.95rem 1.1rem .95rem 2.6rem;border:1px solid var(–border);border-radius:12px;background:#fff;color:var(–black);outline:none;transition:border-color .2s;}
.dest-inp:focus{border-color:var(–sage);}
.dest-ico{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);pointer-events:none;font-size:.85rem;}
.dest-ddl{position:absolute;top:calc(100%+6px);left:0;right:0;background:#fff;border:1px solid var(–border);border-radius:12px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.1);z-index:20;display:none;}
.dest-ddl.open{display:block;}
.dopt{padding:.78rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(–border);transition:background .15s;}
.dopt:last-child{border:none;}
.dopt:hover{background:var(–off);}
.dopt-n{font-size:.84rem;}
.dopt-r{font-size:.66rem;color:var(–mist);}
.dest-pill{display:inline-flex;align-items:center;gap:.4rem;background:rgba(45,74,53,.07);border:1px solid rgba(45,74,53,.15);border-radius:100px;padding:.38rem .9rem;font-size:.82rem;color:var(–sage);margin-bottom:1.5rem;}
.people-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.pbox{background:#fff;border:1px solid var(–border);border-radius:12px;padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;}
.plbl{font-size:.78rem;font-weight:500;}
.psub{font-size:.62rem;color:var(–mist);}
.ctr{display:flex;align-items:center;gap:.6rem;}
.cbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(–border);background:var(–off);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cbtn:hover{border-color:var(–sage);}
.cnum{font-size:.92rem;font-weight:500;min-width:16px;text-align:center;}
.basics-g{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem;}
.fld{display:flex;flex-direction:column;gap:.4rem;}
.fld label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(–mist);}
.fld select{font-family:‘DM Sans’,sans-serif;font-size:.88rem;padding:.72rem .9rem;border:1px solid var(–border);border-radius:10px;background:#fff;color:var(–black);outline:none;}
.fld select:focus{border-color:var(–sage);}

/* BASICS HERO */
.basics-bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:opacity .5s;}
.basics-bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(255,255,255,.88);}
.wiz-body-inner{position:relative;z-index:2;}

/* PLACES */
.filter-row{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.5rem;}
.fchip{padding:.3rem .8rem;border:1px solid var(–border);border-radius:100px;font-size:.7rem;cursor:pointer;background:#fff;color:var(–mist);transition:all .18s;}
.fchip.on{background:var(–sage);border-color:var(–sage);color:#fff;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin-bottom:8rem;}
.pc{border:1px solid var(–border);border-radius:16px;overflow:hidden;background:#fff;position:relative;cursor:pointer;transition:all .25s;}
.pc:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.09);}
.pc.sel{border-color:var(–sage);}
.pc-tick{display:none;position:absolute;top:.7rem;right:.7rem;width:22px;height:22px;border-radius:50%;background:var(–sage);color:#fff;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;z-index:3;}
.pc.sel .pc-tick{display:flex;}
.pc-img-wrap{height:150px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pc-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.88) saturate(.85);transition:transform .5s;}
.pc:hover .pc-img-wrap img{transform:scale(1.06);}
.pc-emoji{font-size:3rem;position:relative;z-index:1;opacity:.7;}
.pc-body{padding:.9rem;}
.pc-cat{font-size:.57rem;letter-spacing:.13em;text-transform:uppercase;color:var(–gold);margin-bottom:.2rem;}
.pc-name{font-family:‘Cormorant Garamond’,serif;font-size:1.05rem;font-weight:400;margin-bottom:.25rem;line-height:1.2;}
.pc-desc{font-size:.7rem;color:var(–mist);line-height:1.55;margin-bottom:.55rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-foot{display:flex;align-items:center;justify-content:space-between;}
.pc-rat{font-size:.67rem;color:var(–gold);}
.pc-price{font-size:.67rem;color:var(–leaf);font-weight:500;}
.pc-more{font-size:.72rem;color:var(–sage);margin-top:.5rem;cursor:pointer;display:inline-flex;align-items:center;gap:.3rem;font-weight:500;padding:.3rem 0;}
.pc-more:hover{color:var(–leaf);}
.skel{background:linear-gradient(90deg,#f0ebe0 25%,#e8e0d0 50%,#f0ebe0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{border-radius:16px;overflow:hidden;border:1px solid var(–border);}
.skel-img{height:150px;}
.skel-body{padding:.9rem;}
.skel-line{height:11px;margin-bottom:.5rem;}

/* BBAR */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:#fff;border-top:2px solid var(–border);padding:1rem 3rem;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 24px rgba(0,0,0,.08);}
.bbar.show{transform:translateY(0);}
.bbar-info{font-size:.84rem;color:#333;}
.bbar-info strong{color:var(–black);font-weight:600;}
.bbar-btns{display:flex;gap:.75rem;align-items:center;}
.btn-skip{padding:.65rem 1.4rem;border:1.5px solid #999;border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.8rem;color:#555;background:transparent;cursor:pointer;transition:all .2s;font-weight:400;}
.btn-skip:hover{border-color:var(–stone);color:var(–black);}
.btn-next{padding:.65rem 1.8rem;background:var(–sage);color:#fff;border:none;border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.03em;}
.btn-next:hover{background:var(–leaf);transform:translateY(-1px);}

/* DRAWER */
#drBg{position:fixed;inset:0;z-index:299;background:rgba(10,10,8,.45);opacity:0;pointer-events:none;transition:opacity .35s;}
#drBg.show{opacity:1;pointer-events:all;}
#drawer{position:fixed;top:0;right:0;bottom:0;z-index:300;width:460px;background:#fff;box-shadow:-20px 0 60px rgba(0,0,0,.12);transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
#drawer.open{transform:translateX(0);}
.dr-hero{height:240px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;}
.dr-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.75) saturate(.85);}
.dr-emoji{position:relative;z-index:1;font-size:4rem;opacity:.4;}
.dr-close{position:absolute;top:.9rem;right:.9rem;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;z-index:2;font-size:.82rem;}
.dr-body{padding:1.6rem;}
.dr-cat{font-size:.57rem;letter-spacing:.16em;text-transform:uppercase;color:var(–gold);margin-bottom:.35rem;}
.dr-name{font-family:‘Cormorant Garamond’,serif;font-size:1.7rem;font-weight:400;color:var(–black);margin-bottom:.2rem;line-height:1.15;}
.dr-rating{display:flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(–mist);margin-bottom:1.1rem;}
.dr-stars{color:var(–gold);}
.dr-div{height:1px;background:var(–border);margin:.9rem 0;}
.dr-sec{font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:var(–stone);margin-bottom:.45rem;}
.dr-text{font-size:.82rem;line-height:1.72;color:#585850;margin-bottom:.9rem;}
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.9rem;}
.dr-cell{background:var(–off);border-radius:9px;padding:.65rem;}
.dr-cl{font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(–mist);margin-bottom:.18rem;}
.dr-cv{font-size:.8rem;font-weight:500;}
.dr-reviews{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.3rem;}
.rv{background:var(–off);border-radius:9px;padding:.75rem;}
.rv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem;}
.rv-a{font-size:.7rem;font-weight:500;}
.rv-s{font-size:.57rem;color:var(–mist);}
.rv-t{font-size:.7rem;color:#585850;line-height:1.58;}
.dr-acts{display:flex;gap:.55rem;}
.btn-add{flex:1;padding:.75rem;background:var(–sage);color:#fff;border:none;border-radius:9px;font-family:‘DM Sans’,sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;}
.btn-add:hover{background:var(–leaf);}
.btn-closdr{padding:.75rem 1rem;border:1px solid var(–border);border-radius:9px;font-family:‘DM Sans’,sans-serif;font-size:.78rem;cursor:pointer;color:var(–mist);}

/* BUTTONS */
.btn-p{padding:.8rem 2rem;background:var(–sage);color:#fff;border:none;border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .22s;}
.btn-p:hover{background:var(–leaf);}
.btn-o{padding:.8rem 1.8rem;background:transparent;color:var(–black);border:1px solid var(–border);border-radius:100px;font-family:‘DM Sans’,sans-serif;font-size:.82rem;cursor:pointer;}

/* RESULT */
.res-wrap{animation:fu .4s ease;}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.res-hd{background:linear-gradient(135deg,var(–sage),#1a3020);border-radius:18px;padding:2.2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.res-hd h2{font-family:‘Cormorant Garamond’,serif;font-size:1.7rem;font-weight:300;color:#fff;margin-bottom:.25rem;}
.res-hd p{color:rgba(255,255,255,.45);font-size:.76rem;}
.res-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.85rem;}
.rtag{padding:.2rem .65rem;border:1px solid rgba(255,255,255,.15);border-radius:100px;color:rgba(255,255,255,.55);font-size:.67rem;}
.res-body{background:#fff;border-radius:16px;border:1px solid var(–border);padding:2.2rem;font-size:.89rem;line-height:1.88;color:var(–black);white-space:pre-wrap;min-height:280px;}
.res-body strong{color:var(–sage);font-weight:500;}
.cursor{display:inline-block;width:2px;height:1em;background:var(–gold);margin-left:2px;vertical-align:middle;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.spin-row{display:flex;align-items:center;gap:.65rem;color:var(–mist);}
.spin{width:16px;height:16px;border:1.5px solid var(–border);border-top-color:var(–gold);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:768px){
nav,nav.solid{padding:1rem 1.5rem;}
.wiz-nav{padding:1rem 1.5rem;}
.wiz-body{padding:2rem 1rem 9rem;}
.vibes-g,.drecs,.pgrid{grid-template-columns:1fr 1fr;}
.basics-g,.people-row{grid-template-columns:1fr;}
#drawer{width:100%;}
.bbar{padding:.9rem 1.5rem;}
.feat-grid{grid-template-columns:1fr 1fr;}
.fc.wide{grid-column:span 2;height:200px;}
.feat-sec{padding:3rem 1.5rem;}
.hero-loc{left:1.5rem;}
.hero-dots{right:1.5rem;}
}
@media(max-width:480px){.vibes-g,.pgrid,.drecs{grid-template-columns:1fr;}.hero h1{font-size:2.8rem;}}

<body>

<nav id="nav">

<section class="hero">

</section>

<div id="wiz">

    <button class="wiz-back" onclick="closeWiz()">← 返回</button>

</div>

<script>

  {n:'格兰坪',r:'国家公园',img:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80'},

const VIBES=[

  {id:'relax',i:'♨️',n:'温泉放松',h:'温泉、SPA、度假村'},
];
const VIBE_RECS={nature:['格兰坪','丹德农山脉','Wilson Promontory'],beach:['大洋路','Brighton Beach','莫宁顿半岛'],food:['雅拉谷','马其顿山','莫宁顿半岛'],wildlife:['菲利普岛','Healesville','格兰坪'],culture:['墨尔本 City','本迪戈','巴拉瑞特'],relax:['莫宁顿半岛','Hepburn Springs','雅拉谷']};
const CHIPS={attractions:['全部','自然景观','历史文化','野生动物','艺术'],restaurants:['全部','咖啡','海鲜','Fine Dining','亚洲菜'],hotels:['全部','精品酒店','民宿','度假村','经济型']};
const GKEY='AIzaSyDegBY5wqNKPshtxbMkyXhpYSNYuEjT9mk';
const EMAP={tourist_attraction:'🏛',natural_feature:'🌿',park:'🌲',museum:'🏛',church:'⛪',amusement_park:'🎡',zoo:'🐨',art_gallery:'🎨',restaurant:'🍽',cafe:'☕',bar:'🍺',lodging:'🏨'};

// ── STATE ──
let path='A',step=0,steps=[];
let state={dest:'',vibes:[],adults:2,children:0,days:'2天',budget:'中等',transport:'自驾',attractions:[],restaurants:[],hotels:[]};
let cache={};
let filters={attractions:'全部',restaurants:'全部',hotels:'全部'};
const SA=['basics','attractions','restaurants','hotels','result'];
const SB=['vibes','dest_pick','basics','attractions','restaurants','hotels','result'];

// ── HERO ──
let si=0;
function initHero(){
  const wrap=document.getElementById('heroSlides');
  const dots=document.getElementById('heroDots');
  wrap.innerHTML=HERO_SLIDES.map((s,i)=>`<div class="hero-slide${i===0?' active':''}" id="hs${i}"><img src="${s.url}" alt="${s.loc}" onerror="this.parentElement.style.opacity='0'"></div>`).join('');
  dots.innerHTML=HERO_SLIDES.map((_,i)=>`<div class="hdot${i===0?' on':''}" onclick="goSlide(${i})"></div>`).join('');
  HERO_SLIDES.forEach(s=>{const p=new Image();p.src=s.url;});
  setInterval(()=>goSlide((si+1)%HERO_SLIDES.length),7000);
}
function goSlide(idx){
  document.getElementById('hs'+si)?.classList.remove('active');
  document.querySelectorAll('.hdot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  si=idx;
  document.getElementById('hs'+idx)?.classList.add('active');
  const loc=document.getElementById('heroLoc');
  if(loc){loc.style.opacity='0';setTimeout(()=>{loc.textContent=HERO_SLIDES[idx].loc;loc.style.opacity='1';loc.style.transition='opacity .5s';},300);}
}

// ── FEATURED ──
function initFeatured(){
  const g=document.getElementById('featGrid');
  if(!g)return;
  g.innerHTML=FEATURED.map(f=>`<div class="fc${f.wide?' wide':''}" onclick="quickDest('${f.n}')"><img src="${f.img}" alt="${f.n}" onerror="this.style.display='none'"><div class="fc-body"><div class="fc-reg">${f.r}</div><div class="fc-name">${f.n}</div></div></div>`).join('');
}

// ── SEARCH ──
function heroFilter(v){
  const ddl=document.getElementById('heroDdl');
  if(!v.trim()){ddl.classList.remove('open');return;}
  const f=CITIES.filter(c=>c.n.toLowerCase().includes(v.toLowerCase())||c.r.toLowerCase().includes(v.toLowerCase()));
  if(!f.length){ddl.classList.remove('open');return;}
  ddl.innerHTML=f.slice(0,8).map(c=>`<div class="sd-item" onclick="quickDest('${c.n}')"><span>${c.e}</span><div><div class="sd-name">${c.n}</div><div class="sd-reg">${c.r}</div></div></div>`).join('');
  ddl.classList.add('open');
}
function closeHeroDdl(){document.getElementById('heroDdl').classList.remove('open');}
function heroGo(){const v=document.getElementById('heroInp').value.trim();if(v)quickDest(v);else openWiz('B');}
function quickDest(n){state.dest=n;state.attractions=[];state.restaurants=[];state.hotels=[];openWiz('A');}

// ── WIZARD ──
function openWiz(p){
  path=p;steps=p==='A'?SA:SB;step=0;
  if(p==='B')state={dest:'',vibes:[],adults:2,children:0,days:'2天',budget:'中等',transport:'自驾',attractions:[],restaurants:[],hotels:[]};
  else state={...state,vibes:[],attractions:[],restaurants:[],hotels:[]};
  document.getElementById('wiz').classList.add('show');
  document.body.style.overflow='hidden';
  renderStep();
}
function closeWiz(){document.getElementById('wiz').classList.remove('show');document.getElementById('bbar').classList.remove('show');document.body.style.overflow='';state.dest='';}
function nextStep(){
  // Remove basics bg when moving away
  const bg=document.getElementById('basicsBg');const bgo=document.getElementById('basicsBgOverlay');
  if(bg)bg.style.opacity='0';
  if(step<steps.length-1){step++;const b=document.getElementById('wizBody');b.style.opacity='0';setTimeout(renderStep,180);}
}

function renderProg(){
  document.getElementById('wizProg').innerHTML=steps.map((s,i)=>{
    const cls=i<step?'done':i===step?'on':'';
    const line=i<steps.length-1?`<div class="wp-line${i<step?' done':''}"></div>`:'';
    return `<div class="wp ${cls}">${i<step?'✓':i+1}</div>${line}`;
  }).join('');
}

function animIn(el){el.style.opacity='0';el.style.transition='none';setTimeout(()=>{el.style.transition='opacity .28s ease';el.style.opacity='1';},30);}

function renderStep(){
  renderProg();
  const b=document.getElementById('wizBody');
  animIn(b);
  const s=steps[step];
  const isPlaces=(s==='attractions'||s==='restaurants'||s==='hotels');
  if(!isPlaces) document.getElementById('bbar').classList.remove('show');
  if(s==='vibes')renderVibes(b);
  else if(s==='dest_pick')renderDestPick(b);
  else if(s==='basics')renderBasics(b);
  else if(s==='attractions')renderPlaces(b,'attractions');
  else if(s==='restaurants')renderPlaces(b,'restaurants');
  else if(s==='hotels')renderPlaces(b,'hotels');
  else if(s==='result')renderResult(b);
}

// ── VIBES ──
function renderVibes(el){
  el.innerHTML=`<div class="sno">Step 1 · 旅行偏好</div><h2 class="stitle">你想要什么样的<em>体验？</em></h2><p class="ssub">选择感兴趣的方向，可多选</p><div class="vibes-g">${VIBES.map(v=>`<div class="vibe${state.vibes.includes(v.id)?' on':''}" onclick="toggleVibe('${v.id}',this)"><span class="vi">${v.i}</span><div class="vn">${v.n}</div><div class="vh">${v.h}</div></div>`).join('')}</div><div style="display:flex;justify-content:flex-end"><button class="btn-p" onclick="nextStep()">下一步 →</button></div>`;
}
function toggleVibe(id,el){state.vibes.includes(id)?state.vibes=state.vibes.filter(v=>v!==id):state.vibes.push(id);el.classList.toggle('on');}

// ── DEST PICK ──
function renderDestPick(el){
  let names=[];state.vibes.forEach(v=>{if(VIBE_RECS[v])names.push(...VIBE_RECS[v]);});

  if(!names.length)names=['墨尔本 City','大洋路','雅拉谷'];
  const recs=names.map(n=>{const c=CITIES.find(c=>c.n===n)||{n,r:'维多利亚州',e:'🗺',img:''};return c;});

}
function pickDest(n,i){state.dest=n;state.attractions=[];state.restaurants=[];state.hotels=[];document.querySelectorAll('.drec').forEach(d=>d.classList.remove('on'));document.getElementById('drec'+i)?.classList.add('on');const h=document.getElementById('dpHint');if(h)h.textContent='已选：'+n;}
function confirmDp(){if(!state.dest){const h=document.getElementById('dpHint');if(h)h.style.color='#b85c2a';return;}nextStep();}

// ── BASICS ──
function renderBasics(el){
  const sn=steps.indexOf('basics')+1;
  // Get destination image for background
  const destCity=CITIES.find(c=>c.n===state.dest);
  const destImg=destCity?.img||'';
  const destBlock=path==='A'?`<div class="dest-wrap"><span class="dest-ico">📍</span><input class="dest-inp" id="destF" placeholder="搜索目的地，如 Bendigo、Apollo Bay…" value="${state.dest}" oninput="filterDest(this.value)" onblur="setTimeout(hideDdl,200)"><div class="dest-ddl" id="destDdl"></div></div>`:`<div class="dest-pill">📍 ${state.dest}</div>`;

  // Set fullscreen background
  const wizEl=document.getElementById('wiz');
  let bgEl=document.getElementById('basicsBg');
  let bgOverlay=document.getElementById('basicsBgOverlay');
  if(!bgEl){
    bgEl=document.createElement('div');bgEl.id='basicsBg';bgEl.className='basics-bg';wizEl.appendChild(bgEl);
    bgOverlay=document.createElement('div');bgOverlay.id='basicsBgOverlay';bgOverlay.className='basics-bg-overlay';wizEl.appendChild(bgOverlay);
  }
  if(destImg){bgEl.style.backgroundImage=`url('${destImg}')`;bgEl.style.opacity='1';}
  else{bgEl.style.opacity='0';}

  el.innerHTML=`
    <div class="sno">Step ${sn} · 基本信息</div>
    <h2 class="stitle">${path==='A'?'你想去哪里？':'确认你的<em>行程</em>'}</h2>
    <p class="ssub">填写基本信息，AI将为你生成最贴合的攻略</p>
    ${destBlock}
    <div class="fld" style="margin-bottom:1.5rem">
      <label>出行人数</label>
      <div class="people-row">
        <div class="pbox"><div><div class="plbl">成人</div><div class="psub">16岁以上</div></div><div class="ctr"><button class="cbtn" onclick="adj('adults',-1)">−</button><div class="cnum" id="aN">${state.adults}</div><button class="cbtn" onclick="adj('adults',1)">+</button></div></div>
        <div class="pbox"><div><div class="plbl">儿童</div><div class="psub">15岁及以下</div></div><div class="ctr"><button class="cbtn" onclick="adj('children',-1)">−</button><div class="cnum" id="cN">${state.children}</div><button class="cbtn" onclick="adj('children',1)">+</button></div></div>
      </div>
    </div>
    <div class="basics-g">
      <div class="fld"><label>旅行天数</label><select onchange="state.days=this.value">${['1天','2天','3天','4-5天','一周+'].map(d=>`<option${state.days===d?' selected':''}>${d}</option>`).join('')}</select></div>
      <div class="fld"><label>预算（每人每天）</label><select onchange="state.budget=this.value">${['经济型 ($50-100/人/天)','中等 ($100-200/人/天)','舒适型 ($200-400/人/天)','豪华型 ($400+/人/天)'].map(d=>`<option${state.budget===d?' selected':''}>${d}</option>`).join('')}</select></div>
      <div class="fld"><label>交通方式</label><select onchange="state.transport=this.value">${['自驾','公共交通','Uber','跟团'].map(d=>`<option${state.transport===d?' selected':''}>${d}</option>`).join('')}</select></div>
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="btn-p" onclick="confirmBasics()">下一步 →</button></div>`;
}
function adj(k,d){state[k]=Math.max(k==='adults'?1:0,state[k]+d);document.getElementById(k==='adults'?'aN':'cN').textContent=state[k];}
function filterDest(v){const ddl=document.getElementById('destDdl');if(!v){ddl.classList.remove('open');return;}const f=CITIES.filter(c=>c.n.toLowerCase().includes(v.toLowerCase())||c.r.toLowerCase().includes(v.toLowerCase()));if(!f.length){ddl.classList.remove('open');return;}ddl.innerHTML=f.slice(0,10).map(c=>`<div class="dopt" onclick="selDest('${c.n}')"><span>${c.e}</span><div><div class="dopt-n">${c.n}</div><div class="dopt-r">${c.r}</div></div></div>`).join('');ddl.classList.add('open');}
function selDest(n){state.dest=n;state.attractions=[];state.restaurants=[];state.hotels=[];const f=document.getElementById('destF');if(f)f.value=n;hideDdl();}
function hideDdl(){const d=document.getElementById('destDdl');if(d)d.classList.remove('open');}
function confirmBasics(){if(path==='A'){const f=document.getElementById('destF');if(f)state.dest=f.value;if(!state.dest.trim()){if(f)f.style.borderColor='#b85c2a';return;}}nextStep();}

// ── PLACES ──
function placeEmoji(types=[]){for(const t of types)if(EMAP[t])return EMAP[t];return '📍';}
function photoUrl(photos){if(!photos?.length)return null;return `https://maps.googleapis.com/maps/api/place/photo?maxwidth=600&photo_reference=${photos[0].photo_reference}&key=${GKEY}`;}

async function fetchPlaces(dest,type){
  const key=`${dest}__${type}`;
  if(cache[key])return cache[key];
  // Build search query - for restaurants/hotels, add attraction context
  let q=dest||'Melbourne';
  if((type==='restaurants'||type==='hotels')&&state.attractions.length>0){
    const attrItems=cache[`${dest}__attractions`]||[];
    const sel=attrItems.find(x=>state.attractions.includes(x.id));
    if(sel?.address){
      const suburb=sel.address.split(',')[0].trim();
      if(suburb&&suburb!==dest) q=suburb+', '+dest;
    }
  }
  try{
    const res=await fetch(`/.netlify/functions/places?query=${encodeURIComponent(q)}&type=${type}`);
    const data=await res.json();
    if(!data.results?.length)return[];
    const items=data.results.slice(0,15).map((p,i)=>({
      id:p.place_id||'p'+i,name:p.name,
      cat:(p.types?.[0]||'place').replace(/_/g,' '),
      e:placeEmoji(p.types),photo:photoUrl(p.photos),
      desc:p.formatted_address||'',
      rating:p.rating?.toFixed(1)||'N/A',
      price:p.price_level?'$'.repeat(p.price_level):'—',
      hours:p.opening_hours?.open_now!=null?(p.opening_hours.open_now?'现在营业中':'现在关闭'):'—',
      address:p.formatted_address||'',
      reviews:(p.reviews||[]).slice(0,2).map(r=>({a:r.author_name,s:'Google',t:r.text?.slice(0,120)||''})),
      place_id:p.place_id,types:p.types||[],
    }));
    cache[key]=items;return items;
  }catch(e){console.error(e);return[];}
}

const PLABELS={attractions:'景点',restaurants:'餐厅',hotels:'住宿'};
const PTITLES={attractions:'选择你想去的<em>景点</em>',restaurants:'选择心仪的<em>餐厅</em>',hotels:'选择你的<em>住宿</em>'};

async function renderPlaces(el,type){
  const sn=steps.indexOf(type)+1;
  let sub=state.dest?`<strong>${state.dest}</strong>`:'';
  if(type==='restaurants'&&state.attractions.length>0) sub+=` · 根据你选的景点推荐附近餐厅`;
  else if(type==='hotels'&&state.attractions.length>0) sub+=` · 根据你选的景点推荐附近住宿`;
  else if(type==='attractions') sub+=` · 点卡片勾选，点「详细介绍」查看更多`;

  el.innerHTML=`
    <div class="sno">Step ${sn} · ${PLABELS[type]}</div>
    <h2 class="stitle">${PTITLES[type]}</h2>
    <p class="ssub">${sub}</p>
    <div class="filter-row">${(CHIPS[type]||[]).map(c=>`<span class="fchip${filters[type]===c?' on':''}" onclick="applyFilter('${type}','${c}',this)">${c}</span>`).join('')}</div>
    <div class="pgrid" id="pgrid">
      ${[...Array(6)].map(()=>`<div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line" style="width:55%"></div><div class="skel skel-line" style="width:88%"></div><div class="skel skel-line" style="width:40%"></div></div></div>`).join('')}
    </div>`;
  document.getElementById('bbar').classList.add('show');
  updateBbar(type);
  const items=await fetchPlaces(state.dest||'Melbourne',type);
  if(!items.length){document.getElementById('pgrid').innerHTML=`<div style="grid-column:1/-1;padding:1.5rem;color:#b85c2a">暂无数据，点「跳过」继续。</div>`;return;}
  renderCards(type,items,state[type]);
}

function renderCards(type,items,sel){
  const g=document.getElementById('pgrid');if(!g)return;
  g.innerHTML=items.map(item=>`
    <div class="pc${sel.includes(item.id)?' sel':''}" id="pc-${item.id}">
      <div class="pc-tick">✓</div>
      <div class="pc-img-wrap" onclick="togglePlace('${type}','${item.id}')">
        ${item.photo?`<img src="${item.photo}" alt="${item.name}" onerror="this.style.display='none'">`:'' }
        <span class="pc-emoji">${item.e}</span>
      </div>
      <div class="pc-body">
        <div class="pc-cat">${item.cat}</div>
        <div class="pc-name">${item.name}</div>
        <div class="pc-desc">${item.desc}</div>
        <div class="pc-foot">
          <span class="pc-rat">${item.rating!=='N/A'?'★ '+item.rating:'—'}</span>
          <span class="pc-price">${item.price}</span>
        </div>
        <div class="pc-more" onclick="openDr('${type}','${item.id}',event)">详细介绍 →</div>
      </div>
    </div>`).join('');
}

function applyFilter(type,chip,el){
  filters[type]=chip;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  const g=document.getElementById('pgrid');
  if(g)g.innerHTML=`<div style="grid-column:1/-1;padding:2rem;display:flex;align-items:center;gap:.7rem;color:var(--mist)"><div class="spin"></div>加载中…</div>`;
  const q=chip==='全部'?state.dest:`${chip} ${state.dest}`;
  fetchPlaces(q,type).then(items=>{renderCards(type,items,state[type]);document.getElementById('bbar').classList.add('show');updateBbar(type);});
}

function togglePlace(type,id){
  const a=state[type];a.includes(id)?state[type]=a.filter(x=>x!==id):state[type].push(id);
  document.getElementById('pc-'+id)?.classList.toggle('sel',state[type].includes(id));
  updateBbar(type);document.getElementById('bbar').classList.add('show');
}
function updateBbar(type){const n=state[type].length;const lb={attractions:'个景点',restaurants:'家餐厅',hotels:'家住宿'};document.getElementById('bbarN').textContent=n;document.querySelector('.bbar-info').innerHTML=`已选 <strong>${n}</strong> ${lb[type]||'项'}`;}

// ── DRAWER ──
function openDr(type,id,e){
  if(e)e.stopPropagation();
  const items=cache[`${state.dest||'Melbourne'}__${type}`]||[];
  const item=items.find(x=>x.id===id);if(!item)return;
  const isSel=state[type].includes(id);
  document.getElementById('drContent').innerHTML=`<div class="dr-hero">${item.photo?`<img src="${item.photo}" alt="${item.name}" onerror="this.style.display='none'">`:''}<span class="dr-emoji">${item.e}</span><button class="dr-close" onclick="closeDr()">✕</button></div><div class="dr-body"><div class="dr-cat">${item.cat}</div><div class="dr-name">${item.name}</div><div class="dr-rating"><span class="dr-stars">★★★★★</span><span>${item.rating}/5.0</span><span>·</span><span>${item.price}</span></div><div class="dr-div"></div><div class="dr-sec">地址</div><div class="dr-text">${item.address||'—'}</div><div class="dr-grid"><div class="dr-cell"><div class="dr-cl">评分</div><div class="dr-cv">${item.rating}</div></div><div class="dr-cell"><div class="dr-cl">营业状态</div><div class="dr-cv">${item.hours}</div></div></div>${item.reviews?.length?`<div class="dr-div"></div><div class="dr-sec">真实评价</div><div class="dr-reviews">${item.reviews.map(r=>`<div class="rv"><div class="rv-top"><span class="rv-a">${r.a}</span><span class="rv-s">${r.s}</span></div><div class="rv-t">${r.t}</div></div>`).join('')}</div>`:''}<div class="dr-div"></div><div class="dr-acts"><button class="btn-add" id="drBtn" onclick="togglePlace('${type}','${id}');updateDrBtn('${type}','${id}')">${isSel?'✓ 已加入行程':'＋ 加入行程'}</button><button class="btn-closdr" onclick="closeDr()">关闭</button></div></div>`;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drBg').classList.add('show');
}
function updateDrBtn(type,id){const b=document.getElementById('drBtn');if(b)b.textContent=state[type].includes(id)?'✓ 已加入行程':'＋ 加入行程';}
function closeDr(){document.getElementById('drawer').classList.remove('open');document.getElementById('drBg').classList.remove('show');}

// ── RESULT ──
async function renderResult(el){
  document.getElementById('bbar').classList.remove('show');
  const dest=state.dest||'维多利亚州';
  const cA=cache[`${dest}__attractions`]||[];
  const cR=cache[`${dest}__restaurants`]||[];
  const cH=cache[`${dest}__hotels`]||[];
  const selA=cA.filter(x=>state.attractions.includes(x.id)).map(x=>x.name);
  const selR=cR.filter(x=>state.restaurants.includes(x.id)).map(x=>x.name);
  const selH=cH.filter(x=>state.hotels.includes(x.id)).map(x=>x.name);
  const hasKids=state.children>0;
  el.innerHTML=`<div class="res-wrap"><div class="res-hd"><h2>${dest} · 专属旅行攻略</h2><p>由 AI 综合景点路线、餐饮安排与住宿推荐生成</p><div class="res-tags"><span class="rtag">📅 ${state.days}</span><span class="rtag">👥 成人${state.adults}人${state.children>0?` · 儿童${state.children}人`:''}</span><span class="rtag">💰 ${state.budget}</span><span class="rtag">🚗 ${state.transport}</span></div></div><div class="res-body" id="resBody"><div class="spin-row"><div class="spin"></div>&nbsp;正在规划最优行程路线…</div></div><div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1.5rem"><button class="btn-o" onclick="step=0;renderStep()">← 重新规划</button><button class="btn-p" onclick="closeWiz()">完成</button></div></div>`;
  const prompt=`你是澳大利亚维多利亚州专业旅游顾问，用精致优雅的中文撰写实用攻略。\n目的地：${dest} | 天数：${state.days} | 成人：${state.adults}人${hasKids?` | 儿童：${state.children}人`:''} | 预算：${state.budget} | 交通：${state.transport}\n${state.vibes.length?`偏好：${state.vibes.map(v=>VIBES.find(x=>x.id===v)?.n).join('、')}\n`:''}\n已选景点：${selA.length?selA.join('、'):'（请推荐2-3个核心景点）'}\n已选餐厅：${selR.length?selR.join('、'):'（请推荐2-3家合适餐厅）'}\n已选住宿：${selH.length?selH.join('、'):'（请推荐最适合的住宿）'}\n\n按地理就近原则排景点顺序，住宿靠近景点聚集地，餐厅安排在动线上${hasKids?'，有儿童注意活动难度和休息':''}。\n\n**✦ 行程概览**\n\n**📅 每日行程**（按天，上午/下午/晚上，标注预计时长和费用）\n\n**🍽 餐饮安排**\n\n**🏨 住宿建议**\n\n**🚗 交通路线**\n\n**✦ 旅行贴士**（5条具体建议）`;
  try{
    const res=await fetch('/.netlify/functions/itinerary',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    if(!res.ok)throw new Error('API error '+res.status);
    const body=document.getElementById('resBody');body.innerHTML='';
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    document.getElementById('resBody').innerHTML=fmt(data.content||'');
  }catch(e){document.getElementById('resBody').innerHTML=`<div style="color:#b85c2a;padding:1rem">生成失败，请重试。</div>`;}
}
function fmt(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{initHero();initFeatured();});
window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('solid',scrollY>60);});
</script>
