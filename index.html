<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rover · Discover Victoria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#0a0a08;--off:#f5f0e8;--mist:#8a8478;--gold:#c9973a;--sage:#2d4a35;--leaf:#4a7a52;--border:#e8e0d0;--ember:#b85c2a;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--black);overflow-x:hidden;}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;transition:all .4s;}
nav.solid{background:rgba(245,240,232,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 3rem;}
.nb{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:#fff;transition:color .4s;}
nav.solid .nb{color:var(--black);}
.nc{padding:.45rem 1.2rem;border:1px solid rgba(255,255,255,.4);border-radius:100px;font-size:.72rem;text-transform:uppercase;color:#fff;background:transparent;cursor:pointer;font-family:inherit;transition:all .3s;}
nav.solid .nc{border-color:var(--sage);color:var(--sage);}
nav.solid .nc:hover{background:var(--sage);color:#fff;}
/* HERO */
.hero{height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.hbg{position:absolute;inset:0;background:linear-gradient(155deg,#0a1a12,#1a3525,#2a5538);}
.hslides{position:absolute;inset:0;}
.hs{position:absolute;inset:0;opacity:0;transition:opacity 2s;}
.hs.on{opacity:1;}
.hs img{width:100%;height:100%;object-fit:cover;filter:brightness(.5) saturate(.7) contrast(1.1);transform:scale(1.08);transition:transform 10s ease-out;}.hs.on img{transform:scale(1.0);}
.hov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.5) 100%);}
.hcnt{position:relative;z-index:2;text-align:center;padding:0 2rem;max-width:760px;}
.hey{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem;}
.hd{width:24px;height:1px;background:var(--gold);}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,6.5rem);font-weight:200;line-height:.95;letter-spacing:.05em;color:#fff;margin-bottom:1rem;text-transform:uppercase;text-shadow:0 2px 32px rgba(0,0,0,.6),0 1px 0 rgba(0,0,0,.3);}
.hero h1 em{display:block;font-style:italic;font-size:clamp(2rem,5vw,4rem);}
.hdesc{font-size:.92rem;color:rgba(255,255,255,.65);margin-bottom:2.5rem;text-shadow:0 1px 12px rgba(0,0,0,.4);}
.sw{position:relative;max-width:560px;margin:0 auto 1.5rem;}
.si{width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.22);border-radius:100px;padding:1rem 1.4rem 1rem 3rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:#fff;outline:none;}
.si::placeholder{color:rgba(255,255,255,.4);}
.sic{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);}
.sb{position:absolute;right:.4rem;top:50%;transform:translateY(-50%);padding:.58rem 1.3rem;background:var(--gold);color:var(--black);border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;}
.htags{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1rem;}
.htag{padding:.35rem .85rem;border:1px solid rgba(255,255,255,.2);border-radius:100px;font-size:.7rem;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;background:transparent;}
.htag:hover{border-color:rgba(255,255,255,.4);color:#fff;}
.hns{background:transparent;border:none;color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.hloc{position:absolute;left:3rem;bottom:2rem;z-index:2;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:.5rem;}
.hloc::before{content:'';width:16px;height:1px;background:var(--gold);}
.hdots{position:absolute;right:3rem;bottom:2rem;z-index:2;display:flex;gap:.4rem;}
.hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s;}
.hdot.on{background:var(--gold);width:16px;border-radius:3px;}
/* SEARCH DROPDOWN */
#heroDdl{position:absolute;top:calc(100%+8px);left:0;right:0;background:rgba(10,10,8,.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;z-index:50;display:none;}
.sdi{padding:.85rem 1.4rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid rgba(255,255,255,.06);transition:background .15s;}
.sdi:last-child{border:none;}
.sdi:hover{background:rgba(255,255,255,.06);}
.sdn{font-size:.86rem;color:#fff;}
.sdr{font-size:.68rem;color:rgba(255,255,255,.4);}
/* FEATURED */
.feat{padding:5rem 3rem;max-width:1200px;margin:0 auto;}
.fey{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
.fh{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:300;color:var(--black);margin-bottom:.4rem;}
.fh em{font-style:italic;color:var(--sage);}
.fsub{font-size:.84rem;color:var(--mist);margin-bottom:2rem;}
.fg{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.fc{border-radius:16px;overflow:hidden;cursor:pointer;position:relative;height:260px;transition:transform .3s;}
.fc:hover{transform:translateY(-4px);}
.fc.wide{grid-column:span 2;}
.fc img{width:100%;height:100%;object-fit:cover;filter:brightness(.65) saturate(.8) contrast(1.1);transition:transform .6s ease;}.fc:hover img{transform:scale(1.05);filter:brightness(.78) saturate(.9) contrast(1.08);}
.fc:hover img{transform:scale(1.05);}
.fcb{position:absolute;bottom:0;left:0;right:0;padding:1.2rem;background:linear-gradient(to top,rgba(10,10,8,.85),transparent);}
.fcr{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,240,232,.55);margin-bottom:.2rem;}
.fcn{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:#fff;}
/* WIZARD */
#wiz{display:none;position:fixed;inset:0;z-index:200;background:#fff;overflow-y:auto;}
#wiz.show{display:block;}
.wn{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--border);padding:1.1rem 3rem;display:flex;align-items:center;justify-content:space-between;}
.wb{font-size:.75rem;color:var(--mist);cursor:pointer;border:none;background:none;font-family:inherit;}
.wb:hover{color:var(--black);}
.wbr{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;}
.wp-row{display:flex;align-items:center;gap:.3rem;}
.wp{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:500;border:1.5px solid #ccc;color:var(--mist);background:#fff;transition:all .3s;}
.wp.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.wp.done{background:var(--leaf);border-color:var(--leaf);color:#fff;}
.wpl{width:16px;height:1px;background:var(--border);}
.wpl.done{background:var(--leaf);}
.wbody{max-width:1020px;margin:0 auto;padding:3rem 2rem 9rem;}
.sno{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;}
.stitle{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;color:var(--black);margin-bottom:.4rem;}
.stitle em{font-style:italic;color:var(--sage);}
.ssub{font-size:.84rem;color:var(--mist);margin-bottom:2rem;}
/* VIBES */
.vg{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.vibe{padding:1.5rem 1.1rem;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;text-align:center;transition:all .22s;}
.vibe.on,.vibe:hover{border-color:var(--sage);}
.vibe.on{background:rgba(45,74,53,.03);}
.vi{font-size:1.6rem;display:block;margin-bottom:.4rem;}
.vn{font-size:.83rem;font-weight:500;margin-bottom:.12rem;}
.vh{font-size:.68rem;color:var(--mist);}
/* DEST PICK */
.drg{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.drec{border:1.5px solid var(--border);border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;transition:all .25s;}
.drec:hover,.drec.on{border-color:var(--sage);}
.drec-img{height:110px;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;overflow:hidden;}
.drec-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.7);}
.drec-body{padding:.85rem 1rem;}
.drec-reg{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.18rem;}
.drec-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:400;margin-bottom:.15rem;}
.drec-why{font-size:.7rem;color:var(--mist);line-height:1.5;}
/* BASICS */
.bh-wrap{position:relative;margin-bottom:2rem;border-radius:16px;overflow:hidden;}
.bh-wrap img{width:100%;height:220px;object-fit:cover;filter:brightness(.7);}
.bh-label{position:absolute;bottom:1.2rem;left:1.4rem;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.dest-wrap{position:relative;margin-bottom:1.5rem;}
.dest-inp{width:100%;font-family:'DM Sans',sans-serif;font-size:.92rem;padding:.95rem 1.1rem .95rem 2.6rem;border:1px solid var(--border);border-radius:12px;background:#fff;color:var(--black);outline:none;transition:border-color .2s;}
.dest-inp:focus{border-color:var(--sage);}
.dest-ico{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);pointer-events:none;}
.dest-ddl{position:absolute;top:calc(100%+6px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.1);z-index:20;display:none;}
.dest-ddl.open{display:block;}
.dopt{padding:.78rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border);transition:background .15s;}
.dopt:last-child{border:none;}
.dopt:hover{background:var(--off);}
.dopt-n{font-size:.84rem;}
.dopt-r{font-size:.66rem;color:var(--mist);}
.dest-pill{display:inline-flex;align-items:center;gap:.4rem;background:rgba(45,74,53,.07);border:1px solid rgba(45,74,53,.15);border-radius:100px;padding:.38rem .9rem;font-size:.82rem;color:var(--sage);margin-bottom:1.5rem;}
.people-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.pbox{background:#fff;border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;}
.plbl{font-size:.78rem;font-weight:500;}
.psub{font-size:.62rem;color:var(--mist);}
.ctr{display:flex;align-items:center;gap:.6rem;}
.cbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--off);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cbtn:hover{border-color:var(--sage);}
.cnum{font-size:.92rem;font-weight:500;min-width:16px;text-align:center;}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem;}
.fld{display:flex;flex-direction:column;gap:.4rem;}
.fld label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(--mist);}
.fld select{font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.72rem .9rem;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--black);outline:none;}
.fld select:focus{border-color:var(--sage);}
/* PLACE CARDS */
.filter-row{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.5rem;}
.fchip{padding:.3rem .8rem;border:1px solid var(--border);border-radius:100px;font-size:.7rem;cursor:pointer;background:#fff;color:var(--mist);transition:all .18s;}
.fchip.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin-bottom:8rem;}
.pc{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#fff;position:relative;transition:all .25s;}
.pc:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.09);}
.pc.sel{border-color:var(--sage);}
.pc-tick{display:none;position:absolute;top:.7rem;right:.7rem;width:22px;height:22px;border-radius:50%;background:var(--sage);color:#fff;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;z-index:3;}
.pc.sel .pc-tick{display:flex;}
.pc-img{height:160px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pc-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.88);transition:transform .5s;}
.pc:hover .pc-img img{transform:scale(1.06);}
.pc-emoji{font-size:3.5rem;position:relative;z-index:1;}
.pc-body{padding:.9rem;}
.pc-cat{font-size:.57rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:.2rem;}
.pc-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;margin-bottom:.25rem;line-height:1.2;}
.pc-desc{font-size:.7rem;color:var(--mist);line-height:1.55;margin-bottom:.55rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-foot{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.pc-rat{font-size:.67rem;color:var(--gold);}
.pc-price{font-size:.67rem;color:var(--leaf);font-weight:500;}
.pc-more{font-size:.72rem;color:var(--sage);cursor:pointer;font-weight:500;}
.pc-more:hover{color:var(--leaf);}
/* BBAR */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:#fff;border-top:2px solid var(--border);padding:1rem 3rem;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -4px 24px rgba(0,0,0,.08);}
.bbar.show{transform:translateY(0);}
.bbar-info{font-size:.84rem;color:#555;}
.bbar-info strong{color:var(--black);font-weight:600;}
.bbar-btns{display:flex;gap:.75rem;}
.btn-skip{padding:.65rem 1.4rem;border:1.5px solid #999;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:#555;background:transparent;cursor:pointer;}
.btn-skip:hover{border-color:var(--sage);color:var(--black);}
.btn-next{padding:.65rem 1.8rem;background:var(--sage);color:#fff;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;}
.btn-next:hover{background:var(--leaf);}
/* DRAWER */
#drBg{position:fixed;inset:0;z-index:299;background:rgba(10,10,8,.45);opacity:0;pointer-events:none;transition:opacity .35s;}
#drBg.show{opacity:1;pointer-events:all;}
#drawer{position:fixed;top:0;right:0;bottom:0;z-index:300;width:460px;background:#fff;box-shadow:-20px 0 60px rgba(0,0,0,.12);transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
#drawer.open{transform:translateX(0);}
.dr-hero{height:240px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a2f,#3d6b4a);display:flex;align-items:center;justify-content:center;}
.dr-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.75);}
.dr-emoji{position:relative;z-index:1;font-size:4rem;opacity:.5;}
.dr-close{position:absolute;top:.9rem;right:.9rem;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;z-index:2;font-size:.82rem;}
.dr-body{padding:1.6rem;}
.dr-cat{font-size:.57rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem;}
.dr-name{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:400;margin-bottom:.2rem;line-height:1.15;}
.dr-rating{display:flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(--mist);margin-bottom:1.1rem;}
.dr-stars{color:var(--gold);}
.dr-div{height:1px;background:var(--border);margin:.9rem 0;}
.dr-sec{font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:#bbb;margin-bottom:.45rem;}
.dr-text{font-size:.82rem;line-height:1.72;color:#585850;margin-bottom:.9rem;}
.dr-facts{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.9rem;}
.dr-fact{background:var(--off);border-radius:9px;padding:.65rem;}
.dr-fl{font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);margin-bottom:.18rem;}
.dr-fv{font-size:.8rem;font-weight:500;}
.dr-acts{display:flex;gap:.55rem;margin-top:1rem;}
.btn-add{flex:1;padding:.75rem;background:var(--sage);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;}
.btn-add:hover{background:var(--leaf);}
.btn-closdr{padding:.75rem 1rem;border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;color:var(--mist);}
/* BUTTONS */
.btn-p{padding:.8rem 2rem;background:var(--sage);color:#fff;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .22s;}
.btn-p:hover{background:var(--leaf);}
.btn-o{padding:.8rem 1.8rem;background:transparent;color:var(--black);border:1px solid var(--border);border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;}
/* RESULT */
.res-hd{background:linear-gradient(135deg,var(--sage),#1a3020);border-radius:18px;padding:2.2rem;margin-bottom:1.5rem;}
.res-hd h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300;color:#fff;margin-bottom:.25rem;}
.res-hd p{color:rgba(255,255,255,.45);font-size:.76rem;}
.res-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.85rem;}
.rtag{padding:.2rem .65rem;border:1px solid rgba(255,255,255,.15);border-radius:100px;color:rgba(255,255,255,.55);font-size:.67rem;}
.res-body{background:#fff;border-radius:16px;border:1px solid var(--border);padding:2.2rem;font-size:.89rem;line-height:1.88;color:var(--black);white-space:pre-wrap;min-height:280px;}
.res-body strong{color:var(--sage);font-weight:500;}
.cursor{display:inline-block;width:2px;height:1em;background:var(--gold);margin-left:2px;vertical-align:middle;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.spin-row{display:flex;align-items:center;gap:.65rem;color:var(--mist);}
.spin{width:16px;height:16px;border:1.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){nav,nav.solid{padding:1rem 1.5rem;}.wn{padding:1rem 1.5rem;}.wbody{padding:2rem 1rem 9rem;}.vg,.drg,.pgrid{grid-template-columns:1fr 1fr;}.bg,.people-row{grid-template-columns:1fr;}#drawer{width:100%;}.bbar{padding:.9rem 1.5rem;}.fg{grid-template-columns:1fr 1fr;}.fc.wide{grid-column:span 2;height:200px;}.feat{padding:3rem 1.5rem;}.hloc{left:1.5rem;}.hdots{right:1.5rem;}}
@media(max-width:480px){.vg,.pgrid,.drg{grid-template-columns:1fr;}.hero h1{font-size:2.8rem;}}
</style>
</head>
<body>
<nav id="nav">
  <div class="nb">Rover</div>
  <button class="nc" onclick="openWiz('A')">开始规划</button>
</nav>

<section class="hero">
  <div class="hbg"></div>
  <div class="hslides" id="heroSlides"></div>
  <div class="hov"></div><div style="position:absolute;inset:0;z-index:1;opacity:.03;background-image:url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"200\"><filter id=\"n\"><feTurbulence type=\"fractalNoise\" baseFrequency=\".9\" numOctaves=\"4\"/></filter><rect width=\"100%25\" height=\"100%25\" filter=\"url(%23n)\"/></svg>');pointer-events:none;"></div>
  <div class="hcnt">
    <div class="hey"><div class="hd"></div>Victoria, Australia<div class="hd"></div></div>
    <h1>Discover<em>Victoria</em></h1>

// ── WIZARD ──
function openWiz(p){
  path=p;steps=p==='A'?SA:SB;step=0;
  if(p==='B')state={dest:'',vibes:[],adults:2,children:0,days:'2天',budget:'中等 ($100-200/人/天)',transport:'自驾',attractions:[],restaurants:[],hotels:[]};
  else state={...state,vibes:[],attractions:[],restaurants:[],hotels:[]};
  document.getElementById('wiz').classList.add('show');
  document.body.style.overflow='hidden';
  renderStep();
}
function closeWiz(){document.getElementById('wiz').classList.remove('show');document.getElementById('bbar').classList.remove('show');document.body.style.overflow='';state.dest='';}
function nextStep(){if(step<steps.length-1){step++;const b=document.getElementById('wizBody');b.style.opacity=0;setTimeout(renderStep,180);}}
function renderProg(){
  document.getElementById('wizProg').innerHTML=steps.map((s,i)=>{
    const cls=i<step?'done':i===step?'on':'';
    const line=i<steps.length-1?`<div class="wpl${i<step?' done':''}"></div>`:'';
    return `<div class="wp ${cls}">${i<step?'✓':i+1}</div>${line}`;
  }).join('');
}
function animIn(el){el.style.opacity=0;el.style.transition='none';setTimeout(()=>{el.style.transition='opacity .28s ease';el.style.opacity=1;},30);}
function renderStep(){
  renderProg();
  const b=document.getElementById('wizBody');animIn(b);
  const s=steps[step];
  const isP=(s==='attractions'||s==='restaurants'||s==='hotels');
  if(!isP)document.getElementById('bbar').classList.remove('show');
  if(s==='vibes')renderVibes(b);
  else if(s==='dest_pick')renderDestPick(b);
  else if(s==='basics')renderBasics(b);
  else if(s==='attractions')renderPlaces(b,'attractions');
  else if(s==='restaurants')renderPlaces(b,'restaurants');
  else if(s==='hotels')renderPlaces(b,'hotels');
  else if(s==='result')renderResult(b);
}

      {id:'fh2',name:`${dest}民宿`,cat:'民宿',e:'🏡',img:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80',desc:`体验当地生活的最佳选择`,rating:'4.4',price:'$$',hours:'',tips:'通过Airbnb预订'},
    ],
  };
  return generic[type]||[];
}

function filterPlaces(items,chip){
  if(chip==='全部')return items;
  const map={
    '自然景观':['自然景观'],'历史文化':['历史文化','历史体验'],'野生动物':['野生动物'],'艺术':['艺术文化'],
    '咖啡早午餐':['咖啡早午餐','咖啡小食','咖啡厅'],'海鲜':['海鲜餐厅'],'Fine Dining':['Fine Dining'],
    '亚洲菜':['亚洲菜','日式餐厅','意大利菜'],
    '精品酒店':['精品酒店','设计酒店'],'历史酒店':['历史酒店'],'度假村':['度假村'],'民宿':['民宿','农场民宿','度假小屋','豪华小屋'],
  };
  const cats=map[chip]||[chip];
  return items.filter(p=>cats.some(c=>p.cat.includes(c)));
}

function renderPlaces(el,type){
  const sn=steps.indexOf(type)+1;
  const LABELS={attractions:'景点',restaurants:'餐厅',hotels:'住宿'};
  const TITLES={attractions:'选择你想去的<em>景点</em>',restaurants:'选择心仪的<em>餐厅</em>',hotels:'选择你的<em>住宿</em>'};
  let sub=state.dest?`<strong>${state.dest}</strong>`:'';
  if(type==='restaurants'&&state.attractions.length>0)sub+=` · 根据景点位置推荐`;
  else if(type==='hotels'&&state.attractions.length>0)sub+=` · 根据景点位置推荐`;
  else if(type==='attractions')sub+=` · 点图片勾选，点「详细介绍」查看更多`;
  const allItems=getPlaces(state.dest,type);
  const chip=type==='attractions'?'全部':(type==='restaurants'?'全部':'全部');
  el.innerHTML=`<div class="sno">Step ${sn} · ${LABELS[type]}</div><h2 class="stitle">${TITLES[type]}</h2><p class="ssub">${sub}</p><div class="filter-row" id="fr">${(CHIPS[type]||[]).map(c=>`<span class="fchip${c==='全部'?' on':''}" onclick="applyF('${type}','${c}',this)">${c}</span>`).join('')}</div><div class="pgrid" id="pgrid"></div>`;
  document.getElementById('bbar').classList.add('show');
  updateBbar(type);
  renderCards(type,allItems,state[type]);
}

function renderCards(type,items,sel){
  const g=document.getElementById('pgrid');if(!g)return;
  if(!items.length){g.innerHTML=`<div style="grid-column:1/-1;padding:1.5rem;color:var(--mist)">暂无数据，点「跳过」继续。</div>`;return;}
  g.innerHTML=items.map(item=>`<div class="pc${sel.includes(item.id)?' sel':''}" id="pc-${item.id}"><div class="pc-tick">✓</div><div class="pc-img" onclick="togglePlace('${type}','${item.id}')" style="background:linear-gradient(135deg,#1e3a2f,#3d6b4a)">${item.img?`<img src="${item.img}" alt="${item.name}" onerror="this.style.display='none'">`:''}<span class="pc-emoji">${item.e}</span></div><div class="pc-body"><div class="pc-cat">${item.cat}</div><div class="pc-name">${item.name}</div><div class="pc-desc">${item.desc}</div><div class="pc-foot"><span class="pc-rat">★ ${item.rating}</span><span class="pc-price">${item.price}</span></div><div class="pc-more" onclick="openDr('${type}','${item.id}',event)">详细介绍 →</div></div></div>`).join('');
}

function applyF(type,chip,el){
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  const all=getPlaces(state.dest,type);
  const filtered=filterPlaces(all,chip);
  renderCards(type,filtered,state[type]);
  document.getElementById('bbar').classList.add('show');
  updateBbar(type);
}

function togglePlace(type,id){
  const a=state[type];a.includes(id)?state[type]=a.filter(x=>x!==id):state[type].push(id);
  document.getElementById('pc-'+id)?.classList.toggle('sel',state[type].includes(id));
  updateBbar(type);document.getElementById('bbar').classList.add('show');
}
function updateBbar(type){const n=state[type].length;const lb={attractions:'个景点',restaurants:'家餐厅',hotels:'家住宿'};document.getElementById('bbarN').textContent=n;document.querySelector('.bbar-info').innerHTML=`已选 <strong>${n}</strong> ${lb[type]||'项'}`;}

// ── DRAWER ──
function openDr(type,id,e){
  if(e)e.stopPropagation();
  const all=getPlaces(state.dest,type);
  const item=all.find(x=>x.id===id);if(!item)return;
  const isSel=state[type].includes(id);
  document.getElementById('drContent').innerHTML=`
    <div class="dr-hero">
      ${item.img?`<img src="${item.img}" alt="${item.name}" onerror="this.style.display='none'">`:'' }
      <span class="dr-emoji">${item.e}</span>
      <button class="dr-close" onclick="closeDr()">✕</button>
    </div>
    <div class="dr-body">
      <div class="dr-cat">${item.cat}</div>
      <div class="dr-name">${item.name}</div>
      <div class="dr-rating"><span class="dr-stars">★★★★★</span><span>${item.rating}/5.0</span><span>·</span><span>${item.price}</span></div>
      <div class="dr-div"></div>
      <div class="dr-sec">简介</div>
      <div class="dr-text">${item.desc}</div>
      <div class="dr-facts">
        <div class="dr-fact"><div class="dr-fl">价格</div><div class="dr-fv">${item.price}</div></div>
        <div class="dr-fact"><div class="dr-fl">开放时间</div><div class="dr-fv">${item.hours||'—'}</div></div>
      </div>
      ${item.tips?`<div class="dr-sec">旅行小贴士</div><div class="dr-text">💡 ${item.tips}</div>`:''}
      <div class="dr-acts">
        <button class="btn-add" id="drBtn" onclick="togglePlace('${type}','${id}');updateDrBtn('${type}','${id}')">${isSel?'✓ 已加入行程':'＋ 加入行程'}</button>
        <button class="btn-closdr" onclick="closeDr()">关闭</button>
      </div>
    </div>`;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drBg').classList.add('show');
}
function updateDrBtn(type,id){const b=document.getElementById('drBtn');if(b)b.textContent=state[type].includes(id)?'✓ 已加入行程':'＋ 加入行程';}
function closeDr(){document.getElementById('drawer').classList.remove('open');document.getElementById('drBg').classList.remove('show');}

// ── RESULT ──
async function renderResult(el){
  document.getElementById('bbar').classList.remove('show');
  const dest=state.dest||'维多利亚州';
  const allA=getPlaces(dest,'attractions');
  const allR=getPlaces(dest,'restaurants');
  const allH=getPlaces(dest,'hotels');
  const selA=allA.filter(x=>state.attractions.includes(x.id)).map(x=>x.name);
  const selR=allR.filter(x=>state.restaurants.includes(x.id)).map(x=>x.name);
  const selH=allH.filter(x=>state.hotels.includes(x.id)).map(x=>x.name);
  el.innerHTML=`<div class="res-hd"><h2>${dest} · 专属旅行攻略</h2><p>由 AI 根据你的选择生成个性化攻略</p><div class="res-tags"><span class="rtag">📅 ${state.days}</span><span class="rtag">👥 成人${state.adults}人${state.children>0?` · 儿童${state.children}人`:''}</span><span class="rtag">💰 ${state.budget}</span><span class="rtag">🚗 ${state.transport}</span></div></div><div class="res-body" id="resBody"><div class="spin-row"><div class="spin"></div>&nbsp;正在为你规划最优行程…</div></div><div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1.5rem"><button class="btn-o" onclick="step=0;renderStep()">← 重新规划</button><button class="btn-p" onclick="closeWiz()">完成</button></div>`;
  const prompt=`你是澳大利亚维多利亚州专业旅游顾问，用精致优雅的中文为游客撰写详细实用的旅行攻略。

目的地：${dest}
旅行天数：${state.days}
成人：${state.adults}人${state.children>0?`，儿童：${state.children}人`:''}
预算：${state.budget}
交通：${state.transport}

已选景点：${selA.length?selA.join('、'):'（请根据目的地推荐2-3个最值得去的景点）'}
已选餐厅：${selR.length?selR.join('、'):'（请推荐2-3家符合预算的餐厅）'}
已选住宿：${selH.length?selH.join('、'):'（请推荐最合适的住宿）'}

请按以下结构生成攻略：

**✦ 行程概览**
简要介绍${dest}的亮点和这次行程的整体安排。

**📅 每日行程安排**
按天详细规划（上午/下午/晚上），标注每个地点的建议停留时长和预计费用。注意景点间的地理位置，合理安排顺序减少不必要的来回。

**🍽 餐饮安排**
将选定的餐厅合理安排在行程中，说明推荐菜品和预订建议。

**🏨 住宿建议**
说明住宿位置优势和入住注意事项。

**🚗 交通路线**
详细说明${state.transport}的路线规划和注意事项。

**✦ 实用贴士**
5条针对${dest}的具体旅行建议，包括最佳游览时间、注意事项、省钱技巧等。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,stream:true,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)throw new Error('API error '+res.status);
    const body=document.getElementById('resBody');body.innerHTML='';
    const reader=res.body.getReader();const dec=new TextDecoder();let full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split('\n')){
        if(line.startsWith('data: ')){
          const d=line.slice(6);if(d==='[DONE]')continue;
          try{const j=JSON.parse(d);if(j.type==='content_block_delta'&&j.delta?.text){full+=j.delta.text;body.innerHTML=fmt(full)+'<span class="cursor"></span>';}}catch{}
        }
      }
    }
    document.getElementById('resBody').innerHTML=fmt(full);
  }catch(e){
    document.getElementById('resBody').innerHTML=`<div style="color:var(--ember);padding:1rem">AI生成失败。请确认网络连接后重试。<br><br><small>注：AI行程生成功能需要Anthropic API密钥。如需开通，请访问 console.anthropic.com</small></div>`;
  }
}
function fmt(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{initHero();initFeatured();});
window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('solid',scrollY>60);});
</script>
